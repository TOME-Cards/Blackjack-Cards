<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOME</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      cursor: pointer;
    }

    /* ── Backgrounds ── */
    .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 20%, #080810 0%, #000 70%); }
    .glow {
      position: fixed; width: 700px; height: 700px;
      top: 50%; left: 50%; transform: translate(-50%, -62%);
      background: radial-gradient(ellipse, rgba(80,100,160,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── HOME SCREEN ── */
    #home {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #home.exit {
      opacity: 0;
      transform: scale(1.15);
      pointer-events: none;
    }

    /* ── Book ── */
    .book-scene {
      perspective: 900px;
      margin-bottom: 3rem;
      transform-style: preserve-3d;
    }

    .book {
      width: 100px; height: 136px;
      position: relative;
      transform-style: preserve-3d;
      transform-origin: 50% 100%;
      animation: spin 9s linear infinite;
      transition: animation 0s;
    }
    .book.opening {
      animation: none;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform: rotateZ(0deg) rotateY(0deg) scale(4);
    }

    @keyframes spin {
      from { transform: rotateZ(14deg) rotateY(0deg); }
      to   { transform: rotateZ(14deg) rotateY(360deg); }
    }

    .book-face { position: absolute; backface-visibility: hidden; }

    /* ── Front cover ── */
    .book-front {
      width: 100px; height: 136px;
      transform: translateZ(12px);
      border-radius: 3px 6px 6px 3px;
      position: relative;
      transition: transform 0s;
    }
    .book-front .glass {
      position: absolute; inset: 0;
      border-radius: 3px 6px 6px 3px;
      background: linear-gradient(135deg,
        rgba(180,210,255,0.20) 0%,
        rgba(140,180,255,0.07) 30%,
        rgba(100,150,220,0.03) 65%,
        rgba(160,200,255,0.14) 100%
      );
      border: 0.5px solid rgba(180,210,255,0.30);
      box-shadow: inset 0 0 0 0.5px rgba(180,210,255,0.1), 0 0 30px rgba(100,160,255,0.10), 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    /* Shine sweep */
    .book-front .glass::before {
      content: ''; position: absolute;
      top: -40%; left: -15%; width: 55%; height: 180%;
      background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.22) 50%, rgba(255,255,255,0.05) 60%, transparent 100%);
      transform: skewX(-10deg);
    }
    /* Inner frame */
    .book-front .glass::after {
      content: ''; position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 0.5px solid rgba(255,255,255,0.10); border-radius: 1px;
    }
    /* Content centered absolutely over glass */
    .book-front .cover-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; z-index: 2;
    }
    .front-ace {
      font-size: 3.2rem; line-height: 1;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 0 20px rgba(200,220,255,0.4);
    }
    .front-label {
      font-size: 0.38rem; font-weight: 500; letter-spacing: 0.45em;
      color: rgba(255,255,255,0.28); text-transform: uppercase; text-indent: 0.45em;
    }

    /* ── Back cover ── */
    .book-back {
      width: 100px; height: 136px;
      transform: translateZ(-12px) rotateY(180deg);
      border-radius: 6px 3px 3px 6px;
      position: absolute; inset: 0;
    }
    .book-back .glass {
      position: absolute; inset: 0;
      border-radius: 6px 3px 3px 6px;
      background: linear-gradient(135deg,
        rgba(255,230,180,0.16) 0%,
        rgba(255,255,255,0.07) 35%,
        rgba(200,180,255,0.03) 65%,
        rgba(255,215,150,0.12) 100%
      );
      border: 0.5px solid rgba(255,235,195,0.22);
      box-shadow: inset 0 0 0 0.5px rgba(255,225,150,0.07), 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .book-back .glass::before {
      content: ''; position: absolute;
      top: -40%; left: -15%; width: 55%; height: 180%;
      background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.04) 60%, transparent 100%);
      transform: skewX(-10deg);
    }
    .book-back .glass::after {
      content: ''; position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 0.5px solid rgba(255,255,255,0.08); border-radius: 1px;
    }
    .book-back .cover-content {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; z-index: 2;
    }

    /* Frosted mini cards */
    .card-pair { position: relative; width: 60px; height: 64px; }
    .mini-card {
      width: 38px; height: 52px; border-radius: 6px;
      position: absolute;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      font-weight: 600;
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 6px 20px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .mini-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
      border-radius: 6px 6px 0 0;
    }
    .mc-ace { left: 0; top: 0; z-index: 2; color: rgba(255,255,255,0.92); }
    .mc-king { right: 0; bottom: 0; z-index: 1; color: rgba(255,90,80,0.95); }
    .mc-rank { font-size: 0.7rem; line-height: 1; position: relative; z-index: 1; }
    .mc-suit { font-size: 0.75rem; line-height: 1; position: relative; z-index: 1; }

    /* Corner accents — on both covers */
    .ca { position: absolute; width: 12px; height: 12px; border-color: rgba(255,255,255,0.2); border-style: solid; z-index: 3; }
    .ca-tl { top: 6px; left: 6px; border-width: 0.5px 0 0 0.5px; }
    .ca-tr { top: 6px; right: 6px; border-width: 0.5px 0.5px 0 0; }
    .ca-bl { bottom: 6px; left: 6px; border-width: 0 0 0.5px 0.5px; }
    .ca-br { bottom: 6px; right: 6px; border-width: 0 0.5px 0.5px 0; }

    /* Spine */
    .book-spine {
      width: 24px; height: 136px; position: absolute; left: -12px; top: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(255,255,255,0.08) 45%, rgba(255,255,255,0.14) 50%, rgba(255,255,255,0.06) 55%, rgba(0,0,0,0.85) 100%);
      border-radius: 3px 0 0 3px;
      transform: rotateY(-90deg) translateZ(0);
      border-left: 0.5px solid rgba(255,255,255,0.15);
    }

    /* Pages */
    .book-pages {
      width: 22px; height: 132px; position: absolute; right: -10px; top: 2px;
      background: repeating-linear-gradient(0deg, rgba(215,222,232,0.8), rgba(215,222,232,0.8) 1px, rgba(175,185,198,0.6) 1px, rgba(175,185,198,0.6) 3px);
      border-radius: 0 1px 1px 0;
      transform: rotateY(90deg) translateZ(1px);
      box-shadow: inset -2px 0 4px rgba(0,0,0,0.15);
    }

    /* ── Logo ── */
    .logo {
      font-size: clamp(4.5rem, 14vw, 7.5rem);
      font-weight: 200; letter-spacing: 0.5em;
      color: #f5f5f7; line-height: 1; text-indent: 0.5em;
    }
    .divider {
      width: 100%; height: 0.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      margin-top: 0.9rem;
    }
    .tagline {
      margin-top: 0.75rem; font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.22em; color: rgba(255,255,255,0.28);
      text-transform: uppercase; text-indent: 0.22em;
    }
    .tap-hint {
      margin-top: 3rem; font-size: 0.68rem; font-weight: 400;
      letter-spacing: 0.18em; color: rgba(255,255,255,0.18);
      animation: fade 2.5s ease-in-out infinite;
    }
    @keyframes fade { 0%,100%{opacity:0.35;} 50%{opacity:1;} }

    /* ── MENU SCREEN ── */
    #menu {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5;
      opacity: 0; pointer-events: none;
    }
    #menu.visible { opacity: 1; pointer-events: all; }

    .menu-header {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 200; letter-spacing: 0.4em;
      color: #f5f5f7; text-indent: 0.4em;
      margin-bottom: 0.5rem;
    }
    .menu-sub {
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25); text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .menu-cards {
      display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
      padding: 0 2rem;
    }
    .menu-tile {
      width: 200px; height: 240px;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
    }
    .menu-tile::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      border-radius: 20px 20px 0 0;
    }
    .menu-tile:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-2px) scale(1.01); }
    .menu-tile:active { transform: scale(0.98); }
    .tile-icon { font-size: 3rem; line-height: 1; }
    .tile-title {
      font-size: 1.1rem; font-weight: 400; letter-spacing: 0.05em; color: #f5f5f7;
    }
    .tile-sub {
      font-size: 0.68rem; font-weight: 300; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35); text-align: center; padding: 0 1rem;
    }

    /* Approve bar */
    .approve-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 1rem 2rem 1.2rem;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-top: 0.5px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; gap: 0.8rem; z-index: 200;
    }
    .approve-label { font-size: 0.7rem; color: rgba(255,255,255,0.22); letter-spacing: 0.08em; }
    .abtn {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em;
      padding: 0.45rem 1.2rem; border-radius: 980px;
      cursor: pointer; transition: opacity 0.15s; border: none;
    }
    .abtn:hover { opacity: 0.85; }
    .abtn-approve { background: #0a84ff; color: #fff; }
    .abtn-change { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 0.5px solid rgba(255,255,255,0.1); }
    #approved-msg { display: none; font-size: 0.72rem; color: #30d158; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>

<!-- HOME SCREEN -->
<div id="home" onclick="openBook()">

  <div class="book-scene">
    <div class="book" id="book">

      <!-- Front -->
      <div class="book-face book-front" id="front-cover">
        <div class="glass"></div>
        <div class="ca ca-tl"></div><div class="ca ca-tr"></div>
        <div class="ca ca-bl"></div><div class="ca ca-br"></div>
        <div class="cover-content">
          <div class="front-ace">♠</div>
          <div class="front-label">TOME</div>
        </div>
      </div>

      <!-- Back -->
      <div class="book-face book-back">
        <div class="glass"></div>
        <div class="ca ca-tl"></div><div class="ca ca-tr"></div>
        <div class="ca ca-bl"></div><div class="ca ca-br"></div>
        <div class="cover-content">
          <div class="card-pair">
            <div class="mini-card mc-ace"><div class="mc-rank">A</div><div class="mc-suit">♠</div></div>
            <div class="mini-card mc-king"><div class="mc-rank">K</div><div class="mc-suit">♥</div></div>
          </div>
        </div>
      </div>

      <div class="book-face book-spine"></div>
      <div class="book-pages"></div>
    </div>
  </div>

  <div class="logo">TOME</div>
  <div class="divider"></div>
  <div class="tagline">Electronic Card Deck</div>
  <div class="tap-hint">Tap to continue</div>

</div>

<!-- MENU SCREEN -->
<div id="menu">
  <div class="menu-header">TOME</div>
  <div class="menu-sub">Electronic Card Deck</div>
  <div class="menu-cards">
    <div class="menu-tile">
      <div class="tile-icon">⚙️</div>
      <div class="tile-title">Card Control</div>
      <div class="tile-sub">Connect, manage and configure your cards</div>
    </div>
    <div class="menu-tile">
      <div class="tile-icon">🃏</div>
      <div class="tile-title">Games</div>
      <div class="tile-sub">Blackjack and more card games</div>
    </div>
  </div>
</div>

<!-- Approve bar -->
<div class="approve-bar">
  <span class="approve-label">Home screen preview — click anywhere to continue</span>
  <button class="abtn abtn-approve" onclick="event.stopPropagation(); approveIt()">Approve</button>
  <button class="abtn abtn-change" onclick="event.stopPropagation(); requestChange()">Request changes</button>
  <span id="approved-msg">Approved ✓</span>
</div>

<script>
let opened = false;

function getCurrentRotation() {
  // Read current rotateY angle from computed style
  const book = document.getElementById('book');
  const matrix = window.getComputedStyle(book).transform;
  if (!matrix || matrix === 'none') return 0;
  // matrix3d or matrix — extract Y rotation
  const values = matrix.replace(/matrix(3d)?\(/, '').replace(')', '').split(',').map(parseFloat);
  if (values.length === 16) {
    // matrix3d: rotateY from values[0] and values[8]
    return Math.round(Math.atan2(values[8], values[0]) * 180 / Math.PI);
  } else if (values.length === 6) {
    return Math.round(Math.atan2(values[1], values[0]) * 180 / Math.PI);
  }
  return 0;
}

function openBook() {
  if (opened) return;
  opened = true;

  const book  = document.getElementById('book');
  const cover = document.getElementById('front-cover');
  const home  = document.getElementById('home');
  const menu  = document.getElementById('menu');
  const scene = document.querySelector('.book-scene');

  // Get current animation progress to continue smoothly to Y=0 (front facing)
  // We do this by switching to a CSS animation that picks up and eases to front
  const elapsed = (Date.now() % 9000) / 9000; // 0–1 progress through 9s spin
  const currentDeg = elapsed * 360; // approximate current rotateY

  // Step 1: Freeze current position, then animate TO rotateY=360 (front)
  // so it keeps turning in the same direction until facing forward
  book.style.animation = 'none';

  // Force reflow to apply animation:none
  void book.offsetWidth;

  // Set current position
  book.style.transform = `rotateZ(14deg) rotateY(${currentDeg}deg)`;

  // Now transition to full 360 (front-facing) — continues spinning forward
  const remaining = (1 - elapsed) * 9000 * 0.4; // speed up slightly
  const targetDeg = currentDeg + (360 - (currentDeg % 360));

  book.style.transition = `transform ${Math.max(400, remaining)}ms cubic-bezier(0.4, 0, 0.2, 1)`;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      book.style.transform = `rotateZ(0deg) rotateY(${targetDeg}deg)`;
    });
  });

  const spinDuration = Math.max(400, remaining);

  // Step 2: Once facing front — swing cover open
  setTimeout(() => {
    cover.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.2, 0.64, 1)';
    cover.style.transformOrigin = 'left center';
    cover.style.transform = 'translateZ(12px) rotateY(-155deg)';

    // Simultaneously start showing menu INSIDE the book (between the pages)
    menu.style.transition = 'none';
    menu.style.opacity = '0';
    menu.style.transform = 'scale(0.15) translateZ(-200px)';
    menu.style.pointerEvents = 'none';
    menu.style.display = 'flex';

    setTimeout(() => {
      menu.style.transition = 'opacity 0.4s ease 0.3s, transform 1.2s cubic-bezier(0.2, 0, 0.2, 1) 0.2s';
      menu.style.opacity = '1';
      menu.style.transform = 'scale(1) translateZ(0px)';
    }, 50);

  }, spinDuration);

  // Step 3: Fade out home screen
  setTimeout(() => {
    home.style.transition = 'opacity 0.5s ease';
    home.style.opacity = '0';
    home.style.pointerEvents = 'none';
  }, spinDuration + 600);

  // Step 4: Fully show menu
  setTimeout(() => {
    home.style.display = 'none';
    menu.style.pointerEvents = 'all';
    menu.classList.add('visible');
  }, spinDuration + 1400);
}

function approveIt() {
  document.querySelector('.abtn-approve').style.display = 'none';
  document.querySelector('.abtn-change').style.display = 'none';
  document.querySelector('.approve-label').style.display = 'none';
  document.getElementById('approved-msg').style.display = 'inline';
}
function requestChange() {
  const c = prompt('What would you like to change?');
  if (c) alert('Got it: "' + c + '" — share this with Claude to apply.');
}
</script>
</body>
</html>
